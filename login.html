<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Login - E-Inventory</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f4f6f9;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .login-card {
        width: 350px;
        padding: 25px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h4 class="text-center">Halo Selamat Datang</h4>
      <p class="text-center text-muted">Inventaris Barang</p>
      <input
        type="text"
        id="username"
        class="form-control mb-2"
        placeholder="Username"
      />
      <input
        type="password"
        id="password"
        class="form-control mb-3"
        placeholder="Password"
      />
      <button class="btn btn-primary w-100" onclick="cekLogin()">Login</button>
    </div>

    <script>
      function cekLogin() {
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;
        if (u === "admin" && p === "12345") {
          window.location.href = "index.html"; // Pindah ke dashboard
        } else {
          alert("Username atau Password salah!");
        }
      }
    </script>
  </body>
</html>
