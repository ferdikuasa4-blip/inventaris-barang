<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Sistem Inventaris Barang</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .sidebar {
        height: 100vh;
        background: #2c3e50;
        color: white;
        padding-top: 20px;
      }
      .sidebar p {
        padding: 15px 20px;
        cursor: pointer;
        margin: 0;
      }
      .sidebar p:hover {
        background: #34495e;
      }
      .content-page {
        display: none;
        padding: 20px;
      }
      .active {
        display: block;
      }
      .card-box {
        background: #007bff;
        color: white;
        padding: 20px;
        border-radius: 10px;
        width: 200px;
        cursor: pointer;
      }
      .hidden {
        display: none !important;
      }
      .login-container {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f6f9;
      }
      .login-card {
        width: 350px;
        padding: 25px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div id="loginPage" class="login-container">
      <div class="login-card">
        <h4 class="text-center">Halo Selamat Datang</h4>
        <p class="text-center text-muted">Inventaris Barang</p>
        <input
          type="text"
          id="username"
          class="form-control mb-2"
          placeholder="Username"
        />
        <input
          type="password"
          id="password"
          class="form-control mb-3"
          placeholder="Password"
        />
        <button class="btn btn-primary w-100" onclick="cekLogin()">
          Login
        </button>
      </div>
    </div>

    <div id="dashboardPage" class="container-fluid hidden">
      <div class="row">
        <div class="col-md-2 sidebar">
          <h5 class="text-center">E-Inventory</h5>
          <hr />
          <p onclick="showPage('dashboard')">Dashboard</p>
          <p onclick="showPage('kelola')">Kelola Barang</p>
          <p onclick="showPage('laporan')">Laporan</p>
          <p onclick="location.reload()" class="text-danger">Logout</p>
        </div>

        <div class="col-md-10">
          <div id="dashboard" class="content-page active">
            <h3>Dashboard</h3>
            <div class="card-box" onclick="showPage('kelola')">
              <h5>Total Barang</h5>
              <h2 id="totalDisplay">0</h2>
            </div>
          </div>

          <div id="kelola" class="content-page">
            <h3>Kelola Barang</h3>
            <div class="row mb-3">
              <div class="col-md-4">
                <input
                  type="text"
                  id="namaBarang"
                  class="form-control"
                  placeholder="Nama Barang"
                />
              </div>
              <div class="col-md-3">
                <input
                  type="number"
                  id="jumlahBarang"
                  class="form-control"
                  placeholder="Jumlah"
                />
              </div>
              <div class="col-md-2">
                <button class="btn btn-success" onclick="tambahBarang()">
                  Tambah
                </button>
              </div>
            </div>
            <table class="table table-bordered">
              <thead>
                <tr>
                  <th>Nama Barang</th>
                  <th>Jumlah</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="tabelBarang"></tbody>
            </table>
          </div>

          <div id="laporan" class="content-page">
            <h3>Laporan Inventaris</h3>
            <button class="btn btn-primary mb-3" onclick="window.print()">
              Cetak Laporan
            </button>
            <table class="table table-striped">
              <thead>
                <tr>
                  <th>Nama Barang</th>
                  <th>Jumlah</th>
                </tr>
              </thead>
              <tbody id="tabelLaporan"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      let data = JSON.parse(localStorage.getItem("inventaris")) || [];

      function cekLogin() {
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;
        // Pengecekan username dan password
        if (u === "admin" && p === "admin") {
          document.getElementById("loginPage").classList.add("hidden");
          document.getElementById("dashboardPage").classList.remove("hidden");
        } else {
          alert("Username atau Password salah!");
        }
      }

      function showPage(id) {
        document
          .querySelectorAll(".content-page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        updateUI();
      }

      function tambahBarang() {
        const nama = document.getElementById("namaBarang").value;
        const jumlah = document.getElementById("jumlahBarang").value;
        if (nama && jumlah) {
          data.push({ nama, jumlah });
          localStorage.setItem("inventaris", JSON.stringify(data));
          document.getElementById("namaBarang").value = "";
          document.getElementById("jumlahBarang").value = "";
          updateUI();
        }
      }

      function hapus(index) {
        data.splice(index, 1);
        localStorage.setItem("inventaris", JSON.stringify(data));
        updateUI();
      }

      function updateUI() {
        document.getElementById("totalDisplay").innerText = data.length;

        let htmlKelola = "";
        data.forEach((item, i) => {
          htmlKelola += `<tr><td>${item.nama}</td><td>${item.jumlah}</td><td><button class="btn btn-danger btn-sm" onclick="hapus(${i})">Hapus</button></td></tr>`;
        });
        document.getElementById("tabelBarang").innerHTML = htmlKelola;

        let htmlLaporan = "";
        data.forEach((item) => {
          htmlLaporan += `<tr><td>${item.nama}</td><td>${item.jumlah}</td></tr>`;
        });
        document.getElementById("tabelLaporan").innerHTML = htmlLaporan;
      }
    </script>
  </body>
</html>
