<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>E-Inventory</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .sidebar {
        height: 100vh;
        background: #2c3e50;
        color: white;
        padding-top: 20px;
      }
      .sidebar p {
        padding: 15px 20px;
        cursor: pointer;
        margin: 0;
        transition: 0.3s;
      }
      .sidebar p:hover {
        background: #34495e;
      }
      .content-page {
        display: none;
        padding: 20px;
      }
      .active {
        display: block;
      }
      .card-box {
        background: #007bff;
        color: white;
        padding: 20px;
        border-radius: 10px;
        width: 200px;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-2 sidebar">
          <h5 class="text-center">E-Inventory</h5>
          <hr />
          <p onclick="showPage('dashboard')">Dashboard</p>
          <p onclick="showPage('kelola')">Kelola Barang</p>
          <p onclick="showPage('laporan')">Laporan</p>
          <p onclick="location.reload()" class="text-danger">Logout</p>
        </div>

        <div class="col-md-10">
          <div id="dashboard" class="content-page active">
            <h3>Dashboard</h3>
            <div class="card-box">
              <h5>Total Barang</h5>
              <h2 id="total">0</h2>
            </div>
          </div>

          <div id="kelola" class="content-page">
            <h3>Kelola Barang</h3>
            <p>Fitur tambah/edit barang akan ada di sini.</p>
          </div>

          <div id="laporan" class="content-page">
            <h3>Laporan</h3>
            <p>Fitur cetak laporan akan ada di sini.</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      function showPage(pageId) {
        // Sembunyikan semua halaman
        document
          .querySelectorAll(".content-page")
          .forEach((page) => page.classList.remove("active"));
        // Tampilkan halaman yang dipilih
        document.getElementById(pageId).classList.add("active");
      }
    </script>
  </body>
</html>
