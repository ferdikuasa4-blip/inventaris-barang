<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Inventaris</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .sidebar {
        height: 100vh;
        background: #2c3e50;
        color: white;
        padding-top: 20px;
      }
      .sidebar p {
        padding: 15px 20px;
        cursor: pointer;
      }
      .content-page {
        display: none;
        padding: 20px;
      }
      .active {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-2 sidebar">
          <h5>E-Inventory</h5>
          <hr />
          <p onclick="showPage('dashboard')">Dashboard</p>
          <p onclick="showPage('kelola')">Kelola Barang</p>
          <p onclick="showPage('laporan')">Laporan</p>
          <p onclick="window.location.href = 'login.html'" class="text-danger">
            Logout
          </p>
        </div>
        <div class="col-md-10">
          <div id="dashboard" class="content-page active">
            <h3>Dashboard</h3>
            ...
          </div>
          <div id="kelola" class="content-page">
            <h3>Kelola Barang</h3>
            ...
          </div>
          <div id="laporan" class="content-page">
            <h3>Laporan</h3>
            ...
          </div>
        </div>
      </div>
    </div>

    <script>
      function showPage(id) {
        document
          .querySelectorAll(".content-page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }
      // ... tambahkan sisa script fungsi tambah/hapus barang di sini ...
    </script>
  </body>
</html>
