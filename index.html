<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Inventaris</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f4f7f6;
      }
      .sidebar {
        height: 100vh;
        background: #2c3e50;
        color: white;
        padding: 20px;
      }
      .card {
        border: none;
        border-radius: 10px;
        color: white;
      }
      .bg-blue {
        background: #007bff;
      }
      .bg-orange {
        background: #fd7e14;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-2 sidebar">
          <h4>E-Inventory</h4>
          <hr />
          <p>Dashboard</p>
          <p>Kelola Barang</p>
          <p>Laporan</p>
        </div>

        <div class="col-md-10 p-4">
          <h2>Dashboard</h2>
          <div class="row mt-4">
            <div class="col-md-3">
              <div class="card bg-blue p-3">
                <h5>Total Barang</h5>
                <h2 id="totalBarang">0</h2>
              </div>
            </div>
          </div>

          <div class="card mt-4 p-4">
            <h4>Tambah Barang Baru</h4>
            <div class="input-group mb-3">
              <input
                type="text"
                id="namaBarang"
                class="form-control"
                placeholder="Nama Barang"
              />
              <input
                type="number"
                id="jumlahBarang"
                class="form-control"
                placeholder="Jumlah"
              />
              <button class="btn btn-success" onclick="tambahBarang()">
                Tambah
              </button>
            </div>

            <table class="table table-striped">
              <thead>
                <tr>
                  <th>Nama Barang</th>
                  <th>Jumlah</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="daftarBarang"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      let barang = JSON.parse(localStorage.getItem("dataBarang")) || [];

      function render() {
        const tbody = document.getElementById("daftarBarang");
        tbody.innerHTML = "";
        barang.forEach((item, index) => {
          tbody.innerHTML += `<tr>
                <td>${item.nama}</td>
                <td>${item.jumlah}</td>
                <td><button class="btn btn-danger btn-sm" onclick="hapusBarang(${index})">Hapus</button></td>
            </tr>`;
        });
        document.getElementById("totalBarang").innerText = barang.length;
        localStorage.setItem("dataBarang", JSON.stringify(barang));
      }

      function tambahBarang() {
        const nama = document.getElementById("namaBarang").value;
        const jumlah = document.getElementById("jumlahBarang").value;
        if (nama && jumlah) {
          barang.push({ nama, jumlah });
          render();
          document.getElementById("namaBarang").value = "";
          document.getElementById("jumlahBarang").value = "";
        }
      }

      function hapusBarang(index) {
        barang.splice(index, 1);
        render();
      }

      render();
    </script>
  </body>
</html>
