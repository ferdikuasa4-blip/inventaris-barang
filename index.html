<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Sistem Inventaris</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
      }
      /* Login Page */
      #loginPage {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f0f2f5;
      }
      .login-card {
        width: 350px;
        padding: 30px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      /* Dashboard Page */
      .sidebar {
        height: 100vh;
        background: #222d32;
        color: white;
        padding-top: 20px;
      }
      .sidebar-item {
        padding: 15px 20px;
        cursor: pointer;
        color: #b8c7ce;
      }
      .sidebar-item:hover {
        background: #1e282c;
        color: white;
      }
      .content {
        background: #ecf0f5;
        min-height: 100vh;
      }

      /* Cards */
      .info-card {
        padding: 20px;
        color: white;
        border-radius: 5px;
        margin-bottom: 20px;
      }
      .bg-blue {
        background: #0073b7;
      }
      .bg-orange {
        background: #ff851b;
      }
      .bg-green {
        background: #00a65a;
      }
      .bg-red {
        background: #dd4b39;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Halaman Login -->
    <div id="loginPage">
      <div class="login-card">
        <h4 class="text-center">Halo Selamat Datang</h4>
        <p class="text-center text-muted">Inventaris Barang</p>
        <input
          type="text"
          id="user"
          class="form-control mb-2"
          placeholder="Username"
        />
        <input
          type="password"
          id="pass"
          class="form-control mb-3"
          placeholder="Password"
        />
        <button class="btn btn-primary w-100" onclick="login()">Login</button>
      </div>
    </div>

    <!-- Halaman Dashboard -->
    <div id="dashboardPage" class="container-fluid hidden">
      <div class="row">
        <div class="col-md-2 sidebar">
          <h5 class="text-center">E-Inventory</h5>
          <div class="sidebar-item">Dashboard</div>
          <div class="sidebar-item">Kelola Data</div>
          <div class="sidebar-item" onclick="location.reload()">Logout</div>
        </div>
        <div class="col-md-10 content p-4">
          <h3>Dashboard <small class="text-muted">Petugas</small></h3>
          <div class="row mt-4">
            <div class="col-md-3">
              <div class="info-card bg-blue">
                <h5>5</h5>
                Buku
              </div>
            </div>
            <div class="col-md-3">
              <div class="info-card bg-orange">
                <h5>5</h5>
                Anggota
              </div>
            </div>
            <div class="col-md-3">
              <div class="info-card bg-green">
                <h5>1</h5>
                Peminjaman
              </div>
            </div>
            <div class="col-md-3">
              <div class="info-card bg-red">
                <h5>1</h5>
                Pengembalian
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function login() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pass").value;
        if (u !== "" && p !== "") {
          document.getElementById("loginPage").classList.add("hidden");
          document.getElementById("dashboardPage").classList.remove("hidden");
        } else {
          alert("Harap isi username dan password");
        }
      }
    </script>
  </body>
</html>
