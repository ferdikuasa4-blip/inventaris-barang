<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>E-Inventory System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .sidebar {
        height: 100vh;
        background: #2c3e50;
        color: white;
        padding-top: 20px;
      }
      .sidebar p {
        padding: 15px 20px;
        cursor: pointer;
        color: white;
        margin: 0;
      }
      .sidebar p:hover {
        background: #34495e;
      }
      .content-page {
        display: none;
        padding: 20px;
      }
      .active {
        display: block;
      }
      .card-box {
        background: #007bff;
        color: white;
        padding: 30px;
        border-radius: 15px;
        width: 250px;
        cursor: pointer;
        text-align: center;
      }
      @media print {
        .sidebar,
        .btn,
        .modal,
        button,
        input {
          display: none !important;
        }
        .content-page {
          display: none !important;
        }
        #laporan {
          display: block !important;
          width: 100%;
          position: absolute;
          top: 0;
          left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-2 sidebar">
          <h4 class="text-center">E-Inventory</h4>
          <hr />
          <p onclick="showPage('dashboard')">Dashboard</p>
          <p onclick="showPage('kelola')">Kelola Barang</p>
          <p onclick="showPage('laporan')">Laporan</p>
          <p onclick="window.location.href = 'login.html'" class="text-danger">
            Logout
          </p>
        </div>

        <div class="col-md-10">
          <div id="dashboard" class="content-page active">
            <h3>Dashboard</h3>
            <div class="card-box" onclick="showPage('kelola')">
              <h5>Total Barang</h5>
              <h1 id="totalDisplay">0</h1>
            </div>
          </div>

          <div id="kelola" class="content-page">
            <div class="d-flex justify-content-between mb-3">
              <h3>Kelola Barang</h3>
              <button
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#tambahModal"
              >
                + Tambah Barang
              </button>
            </div>
            <table class="table table-bordered">
              <thead>
                <tr>
                  <th>Nama</th>
                  <th>Jumlah</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="tabelData"></tbody>
            </table>
          </div>

          <div id="laporan" class="content-page">
            <h3>Laporan Inventaris</h3>
            <button class="btn btn-primary mb-3" onclick="window.print()">
              Cetak Laporan
            </button>
            <table class="table table-striped">
              <thead>
                <tr>
                  <th>Nama</th>
                  <th>Jumlah</th>
                </tr>
              </thead>
              <tbody id="tabelLaporan"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="tambahModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Tambah Barang</h5>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="namaBrg"
              class="form-control mb-2"
              placeholder="Nama Barang"
            />
            <input
              type="number"
              id="jmlBrg"
              class="form-control"
              placeholder="Jumlah"
            />
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Batal
            </button>
            <button
              class="btn btn-success"
              onclick="tambahBarang()"
              data-bs-dismiss="modal"
            >
              Simpan
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function renderData() {
        // Ambil data dan filter sampah (data kosong)
        let rawData = JSON.parse(localStorage.getItem("dataBarang")) || [];
        let barangList = rawData.filter((b) => b.nama && b.jml);

        // Simpan kembali data yang sudah bersih
        localStorage.setItem("dataBarang", JSON.stringify(barangList));

        // Update Dashboard
        document.getElementById("totalDisplay").innerText = barangList.length;

        // Render Tabel Kelola
        let html = "";
        barangList.forEach((b, i) => {
          html += `<tr><td>${b.nama}</td><td>${b.jml}</td><td><button class="btn btn-danger btn-sm" onclick="hapusBarang(${i})">Hapus</button></td></tr>`;
        });
        document.getElementById("tabelData").innerHTML = html;

        // Render Tabel Laporan
        let htmlLaporan = "";
        barangList.forEach((b) => {
          htmlLaporan += `<tr><td>${b.nama}</td><td>${b.jml}</td></tr>`;
        });
        document.getElementById("tabelLaporan").innerHTML = htmlLaporan;
      }

      function tambahBarang() {
        let nama = document.getElementById("namaBrg").value;
        let jml = document.getElementById("jmlBrg").value;
        if (nama && jml) {
          let barangList = JSON.parse(localStorage.getItem("dataBarang")) || [];
          barangList.push({ nama, jml });
          localStorage.setItem("dataBarang", JSON.stringify(barangList));
          document.getElementById("namaBrg").value = "";
          document.getElementById("jmlBrg").value = "";
          renderData();
        }
      }

      function hapusBarang(index) {
        let barangList = JSON.parse(localStorage.getItem("dataBarang")) || [];
        barangList.splice(index, 1);
        localStorage.setItem("dataBarang", JSON.stringify(barangList));
        renderData();
      }

      function showPage(id) {
        document
          .querySelectorAll(".content-page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        renderData();
      }

      renderData();
    </script>
  </body>
</html>
