<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Sistem Inventaris Barang</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .sidebar {
        height: 100vh;
        background: #2c3e50;
        color: white;
        padding-top: 20px;
      }
      .sidebar p {
        padding: 15px 20px;
        cursor: pointer;
        margin: 0;
      }
      .sidebar p:hover {
        background: #34495e;
      }
      .content-page {
        display: none;
        padding: 20px;
      }
      .active {
        display: block;
      }
      .card-box {
        background: #007bff;
        color: white;
        padding: 20px;
        border-radius: 10px;
        width: 200px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-2 sidebar">
          <h5 class="text-center">E-Inventory</h5>
          <hr />
          <p onclick="showPage('dashboard')">Dashboard</p>
          <p onclick="showPage('kelola')">Kelola Barang</p>
          <p onclick="showPage('laporan')">Laporan</p>
          <p onclick="location.reload()" class="text-danger">Logout</p>
        </div>

        <div class="col-md-10">
          <div id="dashboard" class="content-page active">
            <h3>Dashboard</h3>
            <div class="card-box" onclick="showPage('kelola')">
              <h5>Total Barang</h5>
              <h2 id="totalDisplay">0</h2>
            </div>
          </div>

          <div id="kelola" class="content-page">
            <h3>Kelola Barang</h3>
            <div class="row mb-3">
              <div class="col-md-4">
                <input
                  type="text"
                  id="namaBarang"
                  class="form-control"
                  placeholder="Nama Barang"
                />
              </div>
              <div class="col-md-3">
                <input
                  type="number"
                  id="jumlahBarang"
                  class="form-control"
                  placeholder="Jumlah"
                />
              </div>
              <div class="col-md-2">
                <button class="btn btn-success" onclick="tambahBarang()">
                  Tambah
                </button>
              </div>
            </div>
            <table class="table table-bordered">
              <thead>
                <tr>
                  <th>Nama Barang</th>
                  <th>Jumlah</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="tabelBarang"></tbody>
            </table>
          </div>

          <div id="laporan" class="content-page">
            <h3>Laporan Inventaris</h3>
            <button class="btn btn-primary" onclick="window.print()">
              Cetak Laporan
            </button>
            <hr />
            <table class="table">
              <thead>
                <tr>
                  <th>Nama Barang</th>
                  <th>Jumlah</th>
                </tr>
              </thead>
              <tbody id="tabelLaporan"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      let data = JSON.parse(localStorage.getItem("inventaris")) || [];

      function showPage(id) {
        document
          .querySelectorAll(".content-page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        updateUI();
      }

      function tambahBarang() {
        const nama = document.getElementById("namaBarang").value;
        const jumlah = document.getElementById("jumlahBarang").value;
        if (nama && jumlah) {
          data.push({ nama, jumlah });
          localStorage.setItem("inventaris", JSON.stringify(data));
          updateUI();
        }
      }

      function hapus(index) {
        data.splice(index, 1);
        localStorage.setItem("inventaris", JSON.stringify(data));
        updateUI();
      }

      function updateUI() {
        document.getElementById("totalDisplay").innerText = data.length;

        let html = "";
        data.forEach((item, i) => {
          html += `<tr><td>${item.nama}</td><td>${item.jumlah}</td><td><button class="btn btn-danger btn-sm" onclick="hapus(${i})">Hapus</button></td></tr>`;
        });
        document.getElementById("tabelBarang").innerHTML = html;
        document.getElementById("tabelLaporan").innerHTML = html.replace(
          /<td><button.*<\/button><\/td>/g,
          "",
        );
      }

      updateUI();
    </script>
  </body>
</html>
